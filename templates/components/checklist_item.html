{% comment %}
components/checklist_item.html
Rendered standalone by HTMX toggle endpoint and inline by dashboard/session views.
Variables: item (dict with id, label, category), checked (bool), session (TradingSession)
{% endcomment %}
<div class="flex items-center gap-2.5 py-1.5" id="checklist-item-{{ item.id }}">
  <button
    hx-post="{% url 'checklist_toggle' session.date|date:'Y-m-d' item.id %}"
    hx-target="#checklist-item-{{ item.id }}"
    hx-swap="outerHTML"
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    class="flex-shrink-0 w-4 h-4 rounded flex items-center justify-center transition-colors{% if checked %} bg-accent{% endif %}"
    style="{% if checked %}background:var(--accent);border:1px solid var(--accent){% else %}background:transparent;border:1px solid rgba(255,255,255,0.15){% endif %}"
    title="Toggle">
    {% if checked %}<span class="block text-white text-center leading-none" style="font-size:9px;line-height:1">✓</span>{% endif %}
  </button>
  <span class="text-sm transition-colors"
    style="color:{% if checked %}var(--text-muted){% else %}var(--text-secondary){% endif %};{% if checked %}text-decoration:line-through{% endif %}">
    {{ item.label }}
  </span>
</div>
