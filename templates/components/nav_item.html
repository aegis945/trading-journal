{% load journal_extras %}
<a
  href="{{ href }}"
  class="nav-item{% if child %} nav-item-child{% endif %}{% if exact %}{% if request.path == href %} active{% endif %}{% elif href == '/' %}{% if request.path == '/' %} active{% endif %}{% else %}{% if request.path|startswith:href %} active{% endif %}{% endif %}"
>
  <i data-lucide="{{ icon }}" class="nav-icon flex-shrink-0"></i>
  <span
    class="nav-label truncate"
    :class="sidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'"
  >{{ label }}</span>
</a>
