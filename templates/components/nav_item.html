{% load journal_extras %}
{# Active state auto-detected via request.path; exact match for /, prefix match otherwise #}
<a
  href="{{ href }}"
  class="flex items-center gap-3 px-2 py-2 rounded-lg text-sm font-medium transition-colors {% if href == '/' %}{% if request.path == '/' %}bg-accent/15 text-accent{% else %}text-slate-400 hover:bg-white/5 hover:text-slate-200{% endif %}{% else %}{% if request.path|startswith:href %}bg-accent/15 text-accent{% else %}text-slate-400 hover:bg-white/5 hover:text-slate-200{% endif %}{% endif %}"
>
  <span class="w-5 text-center flex-shrink-0 text-base leading-none"
    >{{ icon }}</span
  >
  <span class="truncate" :class="sidebarOpen ? 'block' : 'hidden'"
    >{{ label }}</span
  >
</a>
