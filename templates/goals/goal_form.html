{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}

<div class="max-w-lg card p-6 animate-in">
  <form method="POST" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-xs font-medium mb-1" style="color:var(--text-secondary)">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
      <p class="mt-1 text-xs" style="color:var(--loss)">{{ field.errors|join:", " }}</p>
      {% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <a href="{% url 'goals' %}"
        class="px-4 py-2 text-sm rounded-lg transition-colors"
        style="background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)"
        onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Cancel</a>
      <button type="submit"
        class="px-4 py-2 text-sm font-medium rounded-lg transition-colors"
        style="background:var(--accent);color:#fff"
        onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Save Goal</button>
    </div>
  </form>
</div>

{% endblock %}
