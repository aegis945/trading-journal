{% extends "base.html" %}
{% block title %}
{{ title }}{% endblock %} {% block page_title %}{{ title }}{% endblock %} {% block content %}
<div class="max-w-lg bg-[#161b27] rounded-xl border border-white/5 p-6">
  <form method="POST" class="space-y-4">
    {% csrf_token %} {% for field in form %}
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1"
        >{{ field.label }}</label
      >
      {{ field }} {% if field.errors %}
      <p class="mt-1 text-xs text-loss">{{ field.errors|join:", " }}</p>
      {% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <a
        href="{% url 'goals' %}"
        class="px-4 py-2 text-sm border border-white/10 text-slate-400 hover:bg-white/5 rounded-lg"
        >Cancel</a
      >
      <button
        type="submit"
        class="px-4 py-2 text-sm bg-accent hover:bg-blue-600 text-white rounded-lg"
      >
        Save Goal
      </button>
    </div>
  </form>
</div>
{% endblock %}
