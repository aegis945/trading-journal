{% extends "base.html" %}
{% block title %}Delete Goal{% endblock %}
{% block page_title %}<span class="inline-flex items-center gap-2">
  <a href="{% url 'goals' %}"
     class="inline-flex items-center justify-center w-6 h-6 rounded-md border transition-colors"
     style="border-color:var(--border);color:var(--text-secondary);flex-shrink:0;"
     onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.color='var(--text-primary)'"
     onmouseout="this.style.background='';this.style.color='var(--text-secondary)'">
    <i data-lucide="arrow-left" style="width:12px;height:12px;"></i>
  </a>
  Delete Goal
</span>{% endblock %}
{% block content %}

<div class="max-w-sm card p-6 animate-in">
  <div class="flex items-center gap-3 mb-4">
    <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background:var(--loss-glow)">
      <i data-lucide="trash-2" style="width:16px;height:16px;color:var(--loss)"></i>
    </div>
    <p class="text-sm" style="color:var(--text-primary)">Delete goal <strong>"{{ goal.metric_display }}"</strong>?</p>
  </div>
  <div class="flex gap-3">
    <a href="{% url 'goals' %}"
      class="px-4 py-2 text-sm rounded-lg transition-colors"
      style="background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)"
      onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Cancel</a>
    <form method="POST">
      {% csrf_token %}
      <button class="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg transition-colors"
        style="background:var(--loss);color:#fff"
        onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
        <i data-lucide="trash-2" style="width:13px;height:13px"></i> Delete
      </button>
    </form>
  </div>
</div>

{% endblock %}
